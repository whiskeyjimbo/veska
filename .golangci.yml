version: "2"
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    # errcheck omitted: generates noise for idiomatic defer Close() and fmt.Fprint*
    # patterns; staticcheck (SA4006, SA1006) covers the substantive cases.
  exclusions:
    # golangci-lint v2 moved directory exclusion here (was issues.exclude-dirs).
    # Paths are regexps matched against the file path from the module root.
    paths:
      - ^tools/
    rules:
      # SA5011 false-positive on the `if x == nil { t.Fatal(...) } ... x.Field`
      # idiom in tests. t.Fatal IS terminal, but staticcheck's terminal detection
      # is Go-toolchain-version-sensitive and misses it under some toolchains
      # (CI vs local skew), flagging an unreachable nil deref. A test that truly
      # nil-derefs panics visibly when it runs, so excluding SA5011 in _test.go
      # costs little and ends the recurring false-positive churn.
      - path: _test\.go
        linters:
          - staticcheck
        text: SA5011
