<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
  <!-- "V" (two open strokes) in place of the ground symbol's vertical stem;
       lines have no fillable area, so a theme's fill:currentColor can't fill it -->
  <line x1="14" y1="14" x2="32" y2="41" />
  <line x1="50" y1="14" x2="32" y2="41" />
  <!-- ground bars, decreasing width -->
  <line x1="14" y1="41" x2="50" y2="41" />
  <line x1="22" y1="49" x2="42" y2="49" />
  <line x1="28" y1="56" x2="36" y2="56" />
</svg>
