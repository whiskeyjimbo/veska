[pytest]
markers =
    deep: cross-validates MCP results against direct sqlite queries (slow; run with make test-mcp-deep)
    demo: demo-friendly output mode
    requires_ollama: needs a running Ollama on http://localhost:11434
    golden: canonical end-to-end user-journey test; one per scope
    sad: error-condition tests (every tool's documented error paths)
    critical: invariants whose failure means silent data loss/incorrectness
    alternative: equivalent-path tests (two paths to the same outcome)
    bootstrap: spawns its own daemon in a tmp VESKA_HOME (slow, isolated)

addopts = -v -s --tb=short
