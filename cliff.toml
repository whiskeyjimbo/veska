# git-cliff config - turns this repo's conventional commits into release notes.
# Used by .github/workflows/release.yml (`git-cliff --latest`) to build the
# GitHub release body; also runnable locally: `git-cliff --latest`.
[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
# Drop commits that aren't conventional (merge bots, WIP) from the notes.
filter_unconventional = true
filter_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^style", skip = true },
    { message = "^Merge", skip = true },
]
